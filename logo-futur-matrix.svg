<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Matrix-style data rain forming A -->
  <rect width="64" height="64" fill="#0A1F0F" rx="6"/>
  <!-- Vertical data streams (dim) -->
  <g font-family="monospace" font-size="4" fill="#065F46">
    <text x="6" y="14">1</text><text x="6" y="22">0</text><text x="6" y="30">1</text><text x="6" y="38">1</text><text x="6" y="46">0</text><text x="6" y="54">1</text>
    <text x="54" y="12">0</text><text x="54" y="20">1</text><text x="54" y="28">0</text><text x="54" y="36">1</text><text x="54" y="44">0</text><text x="54" y="52">0</text>
    <text x="14" y="58">1</text><text x="48" y="58">0</text>
  </g>
  <!-- A-shape in bright green -->
  <path fill-rule="evenodd" d="
    M 32 10 L 14 54 L 22 54 L 26 44 L 38 44 L 42 54 L 50 54 Z
    M 28 38 L 32 24 L 36 38 Z
  " fill="#34D399"/>
  <!-- Glow -->
  <path d="M 32 10 L 14 54 L 22 54 L 26 44 L 38 44 L 42 54 L 50 54 Z" stroke="#6EE7B7" stroke-width="0.5" fill="none" opacity="0.8"/>
  <!-- Cursor blink at peak -->
  <rect x="31" y="7" width="2" height="4" fill="#6EE7B7"/>
</svg>
