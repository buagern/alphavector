<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Two mirrored checkmarks forming an A -->
  <!-- Double-check = message delivered successfully (like WhatsApp blue ticks) -->
  <!-- The universal "delivered" symbol IS the brand -->
  <path d="M 8 40 L 28 14 L 32 20" stroke="#1E3A8A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 56 40 L 36 14 L 32 20" stroke="#0EA5E9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bottom connection — forms the crossbar -->
  <path d="M 18 52 L 32 36 L 46 52" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
</svg>
