<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: A with speed/motion lines — fast delivery -->
  <defs>
    <linearGradient id="gspd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Main A shifted right to suggest forward motion -->
  <path fill-rule="evenodd" d="
    M 38 8 L 16 56 L 24 56 L 30 42 L 46 42 L 50 56 L 58 56 Z
    M 33 36 L 38 22 L 43 36 Z
  " fill="url(#gspd)"/>
  <!-- Speed lines (left side) -->
  <line x1="4" y1="28" x2="18" y2="28" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="8" y1="36" x2="20" y2="36" stroke="#0EA5E9" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="6" y1="44" x2="16" y2="44" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
