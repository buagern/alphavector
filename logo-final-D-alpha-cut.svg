<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Direction D — Alpha Cut -->
  <!-- Bold geometric α glyph, sliced by a single surgical diagonal. -->
  <!-- Cut reveals a sliver of Vector Blue on the inner edge. -->

  <!-- Base α (Obsidian) -->
  <path fill-rule="evenodd" d="
    M 30 14 C 19 14 12 22 12 33 C 12 44 19 52 30 52 C 35 52 39 50 42 46 L 42 52 L 52 52 L 52 14 L 42 14 L 42 20 C 39 16 35 14 30 14 Z
    M 30 22 C 24 22 21 27 21 33 C 21 39 24 44 30 44 C 36 44 39 39 39 33 C 39 27 36 22 30 22 Z
  " fill="#0B0D12"/>

  <!-- Surgical diagonal cut (Vector Blue sliver) -->
  <path d="M 14 52 L 50 10 L 54 14 L 18 56 Z" fill="#2D5BFF"/>

  <!-- Re-mask: only the α keeps its shape; the cut shows through only where the α exists -->
  <path fill-rule="evenodd" d="
    M 30 14 C 19 14 12 22 12 33 C 12 44 19 52 30 52 C 35 52 39 50 42 46 L 42 52 L 52 52 L 52 14 L 42 14 L 42 20 C 39 16 35 14 30 14 Z
    M 30 22 C 24 22 21 27 21 33 C 21 39 24 44 30 44 C 36 44 39 39 39 33 C 39 27 36 22 30 22 Z
  " fill="none" stroke="none"/>
</svg>
