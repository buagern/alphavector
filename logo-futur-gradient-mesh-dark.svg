<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bright gradient outer frame visible on dark bg -->
  <defs>
    <linearGradient id="gmeshframe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </linearGradient>
    <radialGradient id="gmesh1d" cx="0.3" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="gmesh2d" cx="0.8" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="gmesh3d" cx="0.5" cy="0.9" r="0.7">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="gmeshbgd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
  </defs>
  <!-- Bright rainbow frame -->
  <rect width="64" height="64" fill="url(#gmeshframe)" rx="10"/>
  <!-- Inner mesh block inset -->
  <rect x="2" y="2" width="60" height="60" fill="url(#gmeshbgd)" rx="9"/>
  <rect x="2" y="2" width="60" height="60" fill="url(#gmesh1d)" rx="9"/>
  <rect x="2" y="2" width="60" height="60" fill="url(#gmesh2d)" rx="9"/>
  <rect x="2" y="2" width="60" height="60" fill="url(#gmesh3d)" rx="9"/>
  <!-- A cutout -->
  <path fill-rule="evenodd" d="
    M 32 14 L 16 52 L 22 52 L 25 44 L 39 44 L 42 52 L 48 52 Z
    M 27 38 L 32 24 L 37 38 Z
  " fill="white" opacity="0.95"/>
</svg>
