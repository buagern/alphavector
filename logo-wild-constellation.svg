<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Star constellation AV — connect the dots -->
  <rect width="64" height="64" fill="#0F172A" rx="8"/>
  <!-- Random background stars -->
  <circle cx="10" cy="10" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="54" cy="8" r="0.5" fill="white" opacity="0.4"/>
  <circle cx="8" cy="32" r="0.3" fill="white" opacity="0.5"/>
  <circle cx="58" cy="20" r="0.4" fill="white" opacity="0.7"/>
  <circle cx="50" cy="56" r="0.5" fill="white" opacity="0.5"/>
  <circle cx="16" cy="52" r="0.3" fill="white" opacity="0.6"/>
  <!-- Constellation connecting lines -->
  <path d="M 10 50 L 18 30 L 24 40 L 32 14 L 40 40 L 46 30 L 54 50" stroke="#38BDF8" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Main stars at key points -->
  <g fill="#38BDF8">
    <circle cx="10" cy="50" r="1.5"/>
    <circle cx="32" cy="14" r="2.5"/>
    <circle cx="54" cy="50" r="1.5"/>
  </g>
  <g fill="#F0F9FF">
    <circle cx="18" cy="30" r="1.2"/>
    <circle cx="24" cy="40" r="1"/>
    <circle cx="40" cy="40" r="1"/>
    <circle cx="46" cy="30" r="1.2"/>
  </g>
  <!-- Glowing main star -->
  <circle cx="32" cy="14" r="5" fill="#38BDF8" opacity="0.2"/>
  <circle cx="32" cy="14" r="8" fill="#38BDF8" opacity="0.08"/>
</svg>
