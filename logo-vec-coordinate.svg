<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: XY coordinate grid with a vector arrow -->
  <!-- Vector space — mathematical, precise, data-driven -->
  <!-- Grid lines -->
  <line x1="10" y1="54" x2="58" y2="54" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="10" y1="54" x2="10" y2="6" stroke="#CBD5E1" stroke-width="1"/>
  <!-- Grid ticks -->
  <line x1="22" y1="52" x2="22" y2="56" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="34" y1="52" x2="34" y2="56" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="46" y1="52" x2="46" y2="56" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="8" y1="42" x2="12" y2="42" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="8" y1="30" x2="12" y2="30" stroke="#CBD5E1" stroke-width="1"/>
  <line x1="8" y1="18" x2="12" y2="18" stroke="#CBD5E1" stroke-width="1"/>
  <!-- The vector arrow — bold, main element -->
  <line x1="10" y1="54" x2="50" y2="14" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 46 10 L 52 12 L 48 18" fill="#0EA5E9" stroke="#0EA5E9" stroke-width="2" stroke-linejoin="round"/>
  <!-- Origin dot -->
  <circle cx="10" cy="54" r="3" fill="#1E3A8A"/>
  <!-- Endpoint dot -->
  <circle cx="50" cy="14" r="3" fill="#0EA5E9"/>
</svg>
