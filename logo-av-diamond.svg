<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: AV merged into a diamond/gem shape -->
  <!-- A points up, V points down — together = diamond -->
  <!-- The diamond IS the logo, not a container -->
  <defs>
    <linearGradient id="gavd" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="40%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Diamond shape -->
  <path d="M 32 2 L 58 28 L 32 62 L 6 28 Z" fill="url(#gavd)"/>
  <!-- Facet lines creating gem effect -->
  <path d="M 6 28 L 32 20 L 58 28" stroke="white" stroke-width="1" opacity="0.3" fill="none"/>
  <path d="M 32 2 L 32 20" stroke="white" stroke-width="1" opacity="0.3"/>
  <path d="M 32 20 L 32 62" stroke="white" stroke-width="1" opacity="0.15"/>
  <!-- Left facet -->
  <path d="M 32 2 L 6 28 L 32 20 Z" fill="white" opacity="0.15"/>
</svg>
