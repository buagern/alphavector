<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Direction C — AV Interlock -->
  <!-- A and inverted V share a single leg; diagonal facet cuts the shared edge. -->

  <!-- A (left half) — Vector Blue -->
  <path d="M 18 6 L 2 58 L 14 58 L 18 44 L 32 44 L 32 32 L 22 32 L 20 24 L 30 24 Z" fill="#2D5BFF"/>

  <!-- V (right half, mirror) — Obsidian -->
  <path d="M 46 58 L 62 6 L 50 6 L 46 20 L 32 20 L 32 32 L 42 32 L 44 40 L 34 40 Z" fill="#0B0D12"/>

  <!-- Shared facet edge at center -->
  <rect x="30" y="20" width="4" height="24" fill="#0B0D12"/>
</svg>
