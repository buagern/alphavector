<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Galaxy spiral -->
  <rect width="64" height="64" fill="#0A0A1F" rx="8"/>
  <defs>
    <radialGradient id="ggal" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="20%" stop-color="#A78BFA"/>
      <stop offset="60%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="26" fill="url(#ggal)" opacity="0.5"/>
  <!-- Spiral arms -->
  <path d="M 32 32 C 32 18 44 10 52 18 C 56 26 48 34 40 32" stroke="#C4B5FD" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M 32 32 C 32 46 20 54 12 46 C 8 38 16 30 24 32" stroke="#C4B5FD" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="5" fill="#FEF3C7"/>
  <circle cx="32" cy="32" r="3" fill="white"/>
  <!-- Distant stars -->
  <circle cx="8" cy="12" r="0.5" fill="white"/>
  <circle cx="56" cy="10" r="0.5" fill="white"/>
  <circle cx="54" cy="52" r="0.5" fill="white"/>
  <circle cx="10" cy="54" r="0.4" fill="white" opacity="0.6"/>
  <circle cx="48" cy="6" r="0.3" fill="white" opacity="0.8"/>
  <!-- Tiny A in the core (barely visible) -->
  <path d="M 30 36 L 32 30 L 34 36 M 31 34 L 33 34" stroke="#1E3A8A" stroke-width="0.6" stroke-linecap="round" fill="none"/>
</svg>
