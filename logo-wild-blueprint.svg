<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Technical blueprint drawing style -->
  <rect width="64" height="64" fill="#0C4A6E"/>
  <!-- Grid -->
  <g stroke="#38BDF8" stroke-width="0.3" opacity="0.4">
    <line x1="0" y1="16" x2="64" y2="16"/>
    <line x1="0" y1="32" x2="64" y2="32"/>
    <line x1="0" y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0" x2="16" y2="64"/>
    <line x1="32" y1="0" x2="32" y2="64"/>
    <line x1="48" y1="0" x2="48" y2="64"/>
  </g>
  <!-- Diamond construction -->
  <path d="M 32 6 L 58 32 L 32 58 L 6 32 Z" stroke="#7DD3FC" stroke-width="1.5" fill="none"/>
  <!-- Construction circles -->
  <circle cx="32" cy="32" r="26" stroke="#38BDF8" stroke-width="0.5" fill="none" stroke-dasharray="2 2"/>
  <!-- A shape -->
  <path d="M 12 48 L 32 14 L 52 48" stroke="#F0F9FF" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 20 38 L 44 38" stroke="#F0F9FF" stroke-width="2" stroke-linecap="round"/>
  <!-- Dimension marks -->
  <circle cx="32" cy="14" r="2" fill="#F0F9FF"/>
  <circle cx="12" cy="48" r="2" fill="#F0F9FF"/>
  <circle cx="52" cy="48" r="2" fill="#F0F9FF"/>
  <!-- Corner measurement -->
  <text x="2" y="62" font-family="monospace" font-size="4" fill="#7DD3FC">α·v</text>
</svg>
