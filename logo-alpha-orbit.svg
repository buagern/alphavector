<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: α with orbital rings — data orbiting, satellite comms -->
  <!-- The α is the planet, data orbits around it -->
  <defs>
    <linearGradient id="gaorb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Orbit rings -->
  <ellipse cx="32" cy="32" rx="28" ry="12" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="32" rx="28" ry="12" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(30 32 32)"/>
  <!-- Central α (solid) -->
  <path fill-rule="evenodd" d="
    M 28 16 C 20 16 14 23 14 32 C 14 41 20 48 28 48 C 32 48 36 46 38 43 L 38 48 L 44 48 L 44 16 L 38 16 L 38 21 C 36 18 32 16 28 16 Z
    M 28 22 C 23 22 20 26 20 32 C 20 38 23 42 28 42 C 33 42 36 38 36 32 C 36 26 33 22 28 22 Z
  " fill="url(#gaorb)"/>
  <!-- Orbiting dots -->
  <circle cx="8" cy="22" r="2.5" fill="#0EA5E9"/>
  <circle cx="56" cy="42" r="2.5" fill="#38BDF8"/>
  <circle cx="50" cy="16" r="1.5" fill="#0EA5E9" opacity="0.5"/>
</svg>
