<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Bold A with arrow crossbar pointing right -->
  <!-- The letter A is formed by two strong diagonal strokes -->
  <!-- The crossbar is replaced by a forward-pointing arrow/chevron -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Bold A shape with arrow crossbar -->
  <path d="M 32 6 L 8 56 L 16 56 L 22 42 L 42 42 L 48 56 L 56 56 Z" fill="url(#g1)"/>
  <!-- Arrow crossbar cut into the A (negative space) -->
  <path d="M 25 34 L 32 28 L 39 34 L 36 34 L 36 38 L 28 38 L 28 34 Z" fill="white"/>
</svg>
