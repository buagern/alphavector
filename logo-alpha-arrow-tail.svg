<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: α with its right leg extending into a vector arrow -->
  <!-- The tail of α becomes the arrow — alpha + vector in one mark -->
  <defs>
    <linearGradient id="gaat" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- α body (the loop) -->
  <path d="M 40 16 C 36 8 28 6 22 10 C 14 16 12 26 14 34 C 16 42 22 48 30 48 C 36 48 40 44 42 38" stroke="#1E3A8A" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Right stem going up then arrow pointing right -->
  <path d="M 42 48 L 42 20 L 56 20" stroke="url(#gaat)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <path d="M 52 14 L 58 20 L 52 26" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
