    <line x1="6" y1="34" x2="6" y2="30"/>
    <line x1="12" y1="38" x2="12" y2="26"/>
    <line x1="18" y1="44" x2="18" y2="20"/>
    <line x1="24" y1="50" x2="24" y2="14"/>
    <line x1="30" y1="56" x2="30" y2="8"/>
    <line x1="36" y1="56" x2="36" y2="8"/>
    <line x1="42" y1="50" x2="42" y2="14"/>
    <line x1="48" y1="44" x2="48" y2="20"/>
    <line x1="54" y1="38" x2="54" y2="26"/>
    <line x1="60" y1="34" x2="60" y2="30"/>
  </g>
  <!-- Gradient on middle bars -->
  <line x1="30" y1="56" x2="30" y2="8" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="56" x2="36" y2="8" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
