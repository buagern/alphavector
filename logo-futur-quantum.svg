<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Quantum / atom orbits — electron paths forming A shape -->
  <defs>
    <linearGradient id="gq" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <!-- 3 ellipse orbits at different angles -->
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="url(#gq)" stroke-width="1.5" fill="none"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="url(#gq)" stroke-width="1.5" fill="none" transform="rotate(60 32 32)"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" stroke="url(#gq)" stroke-width="1.5" fill="none" transform="rotate(120 32 32)"/>
  <!-- Electrons on orbits -->
  <circle cx="58" cy="32" r="2.5" fill="#EC4899"/>
  <circle cx="19" cy="10" r="2" fill="#A78BFA"/>
  <circle cx="45" cy="54" r="2" fill="#F472B6"/>
  <!-- Central nucleus = A -->
  <circle cx="32" cy="32" r="9" fill="#1E1B4B"/>
  <path fill-rule="evenodd" d="
    M 32 26 L 27 39 L 28.5 39 L 29.5 36 L 34.5 36 L 35.5 39 L 37 39 Z
    M 30.5 34 L 32 30 L 33.5 34 Z
  " fill="#C4B5FD"/>
</svg>
