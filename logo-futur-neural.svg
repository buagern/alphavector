<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Neural network — nodes and synapses forming A -->
  <!-- Connections (synapses) -->
  <g stroke="#0EA5E9" stroke-width="1" opacity="0.6">
    <line x1="32" y1="10" x2="20" y2="26"/>
    <line x1="32" y1="10" x2="44" y2="26"/>
    <line x1="32" y1="10" x2="32" y2="32"/>
    <line x1="20" y1="26" x2="12" y2="50"/>
    <line x1="20" y1="26" x2="32" y2="32"/>
    <line x1="44" y1="26" x2="52" y2="50"/>
    <line x1="44" y1="26" x2="32" y2="32"/>
    <line x1="32" y1="32" x2="22" y2="50"/>
    <line x1="32" y1="32" x2="42" y2="50"/>
    <line x1="12" y1="50" x2="22" y2="50"/>
    <line x1="42" y1="50" x2="52" y2="50"/>
    <line x1="22" y1="50" x2="32" y2="44"/>
    <line x1="42" y1="50" x2="32" y2="44"/>
  </g>
  <!-- Nodes (input layer top) -->
  <circle cx="32" cy="10" r="4" fill="#1E3A8A"/>
  <circle cx="32" cy="10" r="2" fill="#38BDF8"/>
  <!-- Hidden layer -->
  <circle cx="20" cy="26" r="3" fill="#0EA5E9"/>
  <circle cx="32" cy="32" r="3.5" fill="#0EA5E9"/>
  <circle cx="44" cy="26" r="3" fill="#0EA5E9"/>
  <!-- Crossbar node -->
  <circle cx="32" cy="44" r="2.5" fill="#0EA5E9"/>
  <!-- Output layer -->
  <circle cx="12" cy="50" r="3" fill="#1E3A8A"/>
  <circle cx="22" cy="50" r="2.5" fill="#0EA5E9"/>
  <circle cx="42" cy="50" r="2.5" fill="#0EA5E9"/>
  <circle cx="52" cy="50" r="3" fill="#1E3A8A"/>
</svg>
