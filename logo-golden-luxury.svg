<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Luxury gold — premium, exclusive, high-end feel -->
  <!-- Gold gradient A on deep navy, like a luxury brand -->
  <defs>
    <linearGradient id="ggold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="30%" stop-color="#F59E0B"/>
      <stop offset="60%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="#0F172A" rx="6"/>
  <!-- Gold A -->
  <path fill-rule="evenodd" d="
    M 32 10 L 12 54 L 20 54 L 26 40 L 38 40 L 44 54 L 52 54 Z
    M 28 35 L 32 22 L 36 35 Z
  " fill="url(#ggold)"/>
  <!-- Thin gold line underline -->
  <line x1="16" y1="58" x2="48" y2="58" stroke="#F59E0B" stroke-width="0.75" opacity="0.5"/>
</svg>
