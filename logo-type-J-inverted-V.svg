<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Direction J — Baseline-Inverted V -->
  <!-- V hanging from cap line, apex pointing DOWN toward the wordmark. -->
  <!-- Both top terminals = 23° cuts. Downward apex = sharp. -->

  <!-- V inverted — two diagonals meeting at baseline pointing down -->
  <path d="
    M 7 9
    L 13 6.5
    L 32 46
    L 13 6.5
    Z
  " fill="#0B0D12"/>

  <!-- Left diagonal stroke (thick, with 23° top cut) -->
  <path d="M 7 9 L 13 6.5 L 34 44 L 28 47 Z" fill="#0B0D12"/>

  <!-- Right diagonal stroke (thick, with 23° top cut) -->
  <path d="M 51 9 L 57 6.5 L 36 47 L 30 44 Z" fill="#0B0D12"/>

  <!-- Cyan accent at sharp apex tip -->
  <circle cx="32" cy="46" r="2" fill="#2D5BFF"/>

  <!-- Wordmark hint below (small cap height) -->
  <g fill="#0B0D12" font-family="'General Sans', 'Inter', sans-serif" font-weight="700" font-size="7" letter-spacing="0.3">
    <text x="14" y="58">ALPHA·VECTOR</text>
  </g>
</svg>
