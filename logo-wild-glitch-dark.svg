<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Frame stands out from dark preview bg -->
  <rect width="64" height="64" fill="#334155" rx="4"/>
  <rect x="2" y="2" width="60" height="60" fill="#1E293B" rx="3"/>
  <!-- Red channel offset -->
  <path d="M 6 52 L 18 10 L 30 32 L 42 10 L 54 52" stroke="#F87171" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <!-- Cyan channel offset -->
  <path d="M 10 52 L 22 10 L 34 32 L 46 10 L 58 52" stroke="#67E8F9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <!-- Main white -->
  <path d="M 8 52 L 20 10 L 32 32 L 44 10 L 56 52" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Glitch bars -->
  <rect x="0" y="24" width="64" height="1" fill="#67E8F9" opacity="0.7"/>
  <rect x="0" y="40" width="64" height="1" fill="#F87171" opacity="0.5"/>
  <rect x="14" y="30" width="20" height="0.5" fill="white" opacity="0.9"/>
</svg>
