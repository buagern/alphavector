<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Mathematical vector notation — V with arrow on top (V̄) -->
  <!-- Clean, academic, smart — "we know what vector means" -->
  <defs>
    <linearGradient id="gvam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Bold V -->
  <path d="M 8 16 L 32 54 L 56 16 L 46 16 L 32 42 L 18 16 Z" fill="#1E3A8A"/>
  <!-- Arrow on top (vector notation) -->
  <line x1="12" y1="8" x2="52" y2="8" stroke="url(#gvam)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 48 4 L 54 8 L 48 12" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
