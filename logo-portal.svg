<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Portal/gateway — a bold A that IS a gateway/door -->
  <!-- The negative space inside is the "gate" that messages pass through -->
  <!-- SMS Gateway = literal gateway visualization -->
  <defs>
    <linearGradient id="gprt" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- A as gateway frame -->
  <path fill-rule="evenodd" d="
    M 32 4 L 4 58 L 16 58 L 22 44 L 42 44 L 48 58 L 60 58 Z
    M 27 38 L 32 20 L 37 38 Z
  " fill="url(#gprt)"/>
  <!-- Glowing particle passing through the gate -->
  <circle cx="32" cy="32" r="2.5" fill="#38BDF8"/>
  <circle cx="32" cy="32" r="5" fill="#38BDF8" opacity="0.2"/>
  <circle cx="32" cy="32" r="8" fill="#38BDF8" opacity="0.08"/>
  <!-- Incoming particle trail -->
  <circle cx="32" cy="48" r="1.5" fill="#0EA5E9" opacity="0.4"/>
  <circle cx="32" cy="52" r="1" fill="#0EA5E9" opacity="0.2"/>
  <!-- Outgoing particle -->
  <circle cx="32" cy="16" r="1.5" fill="#38BDF8" opacity="0.4"/>
  <circle cx="32" cy="12" r="1" fill="#38BDF8" opacity="0.2"/>
</svg>
