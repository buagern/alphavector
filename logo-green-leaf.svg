<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Organic/nature — A formed by two leaves meeting at top -->
  <!-- Growth, natural, sustainable tech, earth-toned -->
  <defs>
    <linearGradient id="gleaf" x1="0" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <!-- Left leaf -->
  <path d="M 32 8 C 20 8 8 20 8 40 C 8 50 14 56 20 56 L 28 56 L 32 44 Z" fill="url(#gleaf)"/>
  <!-- Right leaf -->
  <path d="M 32 8 C 44 8 56 20 56 40 C 56 50 50 56 44 56 L 36 56 L 32 44 Z" fill="#059669"/>
  <!-- Center vein -->
  <line x1="32" y1="12" x2="32" y2="44" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Small seed/dot at base -->
  <circle cx="32" cy="50" r="3" fill="white" opacity="0.8"/>
</svg>
