<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: A formed by connected nodes/dots — network graph style -->
  <!-- Represents connectivity, routing, data paths -->
  <!-- Main A frame lines -->
  <path d="M 32 8 L 10 56" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 32 8 L 54 56" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
  <path d="M 20 36 L 44 36" stroke="#0EA5E9" stroke-width="4" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="32" cy="8" r="5" fill="#0EA5E9"/>
  <circle cx="10" cy="56" r="4" fill="#1E3A8A"/>
  <circle cx="54" cy="56" r="4" fill="#1E3A8A"/>
  <circle cx="20" cy="36" r="3.5" fill="#0EA5E9"/>
  <circle cx="44" cy="36" r="3.5" fill="#0EA5E9"/>
  <!-- Arrow from crossbar extending right -->
  <path d="M 44 36 L 56 36" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 53 33 L 57 36 L 53 39" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
