<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- AV Diamond v3 — 3D faceted gem, divider pulled lower -->
  <!-- Top half = A, bottom half = V, gem facets create 3D depth -->

  <!-- === A portion (top, larger) === -->
  <!-- Top-left facet (darker) -->
  <path d="M 32 2 L 6 28 L 32 22 Z" fill="#0EA5E9"/>
  <!-- Top-right facet (lighter, catches light) -->
  <path d="M 32 2 L 58 28 L 32 22 Z" fill="#38BDF8"/>
  <!-- Bottom-left of A (medium) -->
  <path d="M 6 28 L 12 38 L 32 38 L 32 22 Z" fill="#0284C7"/>
  <!-- Bottom-right of A (slightly lighter) -->
  <path d="M 58 28 L 52 38 L 32 38 L 32 22 Z" fill="#0EA5E9"/>

  <!-- A crossbar cutout (negative space triangle) -->
  <path d="M 24 30 L 32 16 L 40 30 Z" fill="white" opacity="0.2"/>

  <!-- === Divider line === -->
  <line x1="12" y1="39.5" x2="52" y2="39.5" stroke="white" stroke-width="2"/>

  <!-- === V portion (bottom, smaller) === -->
  <!-- Bottom-left facet -->
  <path d="M 12 41 L 32 41 L 32 62 Z" fill="#1E3A8A"/>
  <!-- Bottom-right facet (slightly lighter) -->
  <path d="M 52 41 L 32 41 L 32 62 Z" fill="#1E40AF"/>

  <!-- Center ridge highlight for 3D effect -->
  <line x1="32" y1="2" x2="32" y2="22" stroke="white" stroke-width="0.75" opacity="0.4"/>
  <line x1="32" y1="41" x2="32" y2="62" stroke="white" stroke-width="0.75" opacity="0.15"/>

  <!-- Subtle edge highlights -->
  <path d="M 32 2 L 58 28" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <path d="M 52 38 L 52 41" stroke="white" stroke-width="0.5" opacity="0.15"/>
</svg>
