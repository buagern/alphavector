<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Soft rounded AV — friendly, modern SaaS style -->
  <!-- Thick rounded strokes, approachable, not sharp -->
  <defs>
    <linearGradient id="gavr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- A with rounded strokes -->
  <path d="M 6 52 Q 6 50 7 48 L 18 14 Q 19 10 22 10 L 22 10 Q 25 10 26 14 L 32 32" stroke="url(#gavr)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- A crossbar -->
  <path d="M 12 38 L 28 38" stroke="url(#gavr)" stroke-width="5" stroke-linecap="round"/>
  <!-- V with rounded strokes -->
  <path d="M 34 10 Q 34 10 36 14 L 44 40 Q 45 44 46 44 Q 47 44 48 40 L 56 14 Q 58 10 58 10" stroke="url(#gavr)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
