<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: α built from pure geometric shapes — circles + rectangle -->
  <!-- Bauhaus-inspired, constructivist, mathematical -->
  <!-- The loop of α = perfect circle -->
  <circle cx="26" cy="32" r="18" stroke="#1E3A8A" stroke-width="6" fill="none"/>
  <!-- The stem of α = rectangle -->
  <rect x="41" y="8" width="6" height="48" rx="3" fill="#0EA5E9"/>
  <!-- Connection point — where circle meets stem -->
  <circle cx="44" cy="32" r="4" fill="#1E3A8A"/>
</svg>
