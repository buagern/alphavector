<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Trajectory/flight path — curving upward arc -->
  <!-- Growth trajectory, going places, aimed at the sky -->
  <defs>
    <linearGradient id="gvt" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <!-- Curved trajectory path -->
  <path d="M 8 52 C 16 52 24 48 32 36 C 40 24 48 12 56 8" stroke="url(#gvt)" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Arrow head at end -->
  <path d="M 52 14 L 58 6 L 50 8" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dotted trail behind -->
  <circle cx="8" cy="52" r="2" fill="#1E3A8A" opacity="0.3"/>
  <circle cx="14" cy="50" r="2" fill="#1E3A8A" opacity="0.4"/>
  <circle cx="20" cy="47" r="2" fill="#1E3A8A" opacity="0.5"/>
  <!-- V shape formed by the curve and baseline -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="#1E3A8A" stroke-width="1" opacity="0.15" stroke-dasharray="4 3"/>
</svg>
