<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Digital glitch/chromatic aberration AV -->
  <rect width="64" height="64" fill="#0A0A0A"/>
  <!-- Red channel offset -->
  <path d="M 6 52 L 18 10 L 30 32 L 42 10 L 54 52" stroke="#EF4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Cyan channel offset -->
  <path d="M 10 52 L 22 10 L 34 32 L 46 10 L 58 52" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <!-- Main white -->
  <path d="M 8 52 L 20 10 L 32 32 L 44 10 L 56 52" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Glitch bars -->
  <rect x="0" y="24" width="64" height="1" fill="#22D3EE" opacity="0.6"/>
  <rect x="0" y="40" width="64" height="1" fill="#EF4444" opacity="0.4"/>
  <rect x="14" y="30" width="20" height="0.5" fill="white" opacity="0.8"/>
</svg>
