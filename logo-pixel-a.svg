<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Pixel art / 8-bit style A — retro gaming nostalgia -->
  <!-- Each "pixel" is a 6x6 square -->
  <g fill="#7C3AED">
    <!-- Row 1 - peak -->
    <rect x="27" y="4" width="6" height="6" rx="1"/>
    <!-- Row 2 -->
    <rect x="21" y="10" width="6" height="6" rx="1"/>
    <rect x="33" y="10" width="6" height="6" rx="1"/>
    <!-- Row 3 -->
    <rect x="15" y="16" width="6" height="6" rx="1"/>
    <rect x="39" y="16" width="6" height="6" rx="1"/>
    <!-- Row 4 -->
    <rect x="9" y="22" width="6" height="6" rx="1"/>
    <rect x="45" y="22" width="6" height="6" rx="1"/>
    <!-- Row 5 - crossbar -->
    <rect x="9" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="15" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="21" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="27" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="33" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="39" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <rect x="45" y="28" width="6" height="6" rx="1" fill="#A78BFA"/>
    <!-- Row 6 -->
    <rect x="5" y="34" width="6" height="6" rx="1"/>
    <rect x="49" y="34" width="6" height="6" rx="1"/>
    <!-- Row 7 -->
    <rect x="3" y="40" width="6" height="6" rx="1"/>
    <rect x="51" y="40" width="6" height="6" rx="1"/>
    <!-- Row 8 - base -->
    <rect x="1" y="46" width="6" height="6" rx="1"/>
    <rect x="53" y="46" width="6" height="6" rx="1"/>
  </g>
</svg>
