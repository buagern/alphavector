  <path d="M 16 52 L 48 52 L 50 56 L 14 56 Z" fill="#1E3A8A" opacity="0.4"/>
  <!-- Twist highlight -->
  <path d="M 28 8 L 32 18 L 30 22 L 26 14 Z" fill="white" opacity="0.3"/>
  <path d="M 36 8 L 32 18 L 34 22 L 38 14 Z" fill="white" opacity="0.2"/>
</svg>
