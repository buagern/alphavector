<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Stacked layers / cards — platform, product family, stack -->
  <!-- Works for any product: "built on our platform" -->
  <rect x="10" y="14" width="44" height="10" rx="2" fill="#38BDF8"/>
  <rect x="10" y="28" width="44" height="10" rx="2" fill="#0EA5E9"/>
  <rect x="10" y="42" width="44" height="10" rx="2" fill="#1E3A8A"/>
  <!-- Highlights on top layer -->
  <rect x="10" y="14" width="44" height="3" rx="2" fill="white" opacity="0.3"/>
</svg>
