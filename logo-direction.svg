<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: Contained symbol — A inside a rounded square with arrow breaking out -->
  <!-- Suggests a message being sent, breaking boundaries -->
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>
  <!-- Rounded square container -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#g6)"/>
  <!-- White A with arrow built in -->
  <path fill-rule="evenodd" d="
    M 32 12 L 14 52 L 22 52 L 26 42 L 38 42 L 42 52 L 50 52 Z
    M 28 36 L 32 24 L 36 36 Z
  " fill="white"/>
  <!-- Arrow accent breaking out top-right -->
  <path d="M 44 4 L 56 4 L 56 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 56 4 L 44 16" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
