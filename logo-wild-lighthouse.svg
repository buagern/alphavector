<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Lighthouse beacon casting light — signal/broadcast -->
  <!-- Light beams radiating -->
  <defs>
    <linearGradient id="gbeam" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FEF3C7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M 32 32 L 12 6 L 52 6 Z" fill="url(#gbeam)"/>
  <path d="M 32 32 L 4 18 L 4 46 Z" fill="url(#gbeam)" opacity="0.5"/>
  <path d="M 32 32 L 60 18 L 60 46 Z" fill="url(#gbeam)" opacity="0.5"/>
  <!-- Lighthouse body (A shape) -->
  <path fill-rule="evenodd" d="
    M 32 16 L 20 54 L 28 54 L 30 48 L 34 48 L 36 54 L 44 54 Z
    M 31 44 L 32 38 L 33 44 Z
  " fill="#1E3A8A"/>
  <!-- Beacon light at top -->
  <circle cx="32" cy="16" r="4" fill="#FBBF24"/>
  <circle cx="32" cy="16" r="7" fill="#FBBF24" opacity="0.3"/>
  <circle cx="32" cy="16" r="10" fill="#FBBF24" opacity="0.15"/>
  <!-- Water line -->
  <path d="M 4 56 Q 16 54 32 56 Q 48 58 60 56" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 4 60 Q 16 58 32 60 Q 48 62 60 60" stroke="#0EA5E9" stroke-width="1" fill="none" opacity="0.4"/>
</svg>
