<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- AR HUD targeting reticle with A -->
  <!-- Outer corner brackets -->
  <g stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M 4 12 L 4 4 L 12 4"/>
    <path d="M 60 12 L 60 4 L 52 4"/>
    <path d="M 4 52 L 4 60 L 12 60"/>
    <path d="M 60 52 L 60 60 L 52 60"/>
  </g>
  <!-- Crosshair -->
  <line x1="32" y1="18" x2="32" y2="22" stroke="#0EA5E9" stroke-width="1"/>
  <line x1="32" y1="42" x2="32" y2="46" stroke="#0EA5E9" stroke-width="1"/>
  <line x1="18" y1="32" x2="22" y2="32" stroke="#0EA5E9" stroke-width="1"/>
  <line x1="42" y1="32" x2="46" y2="32" stroke="#0EA5E9" stroke-width="1"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" stroke="#0EA5E9" stroke-width="0.8" fill="none" opacity="0.5"/>
  <circle cx="32" cy="32" r="18" stroke="#0EA5E9" stroke-width="1.2" fill="none" stroke-dasharray="2 1"/>
  <!-- A in the center -->
  <path fill-rule="evenodd" d="
    M 32 18 L 22 46 L 26 46 L 28 40 L 36 40 L 38 46 L 42 46 Z
    M 29 36 L 32 28 L 35 36 Z
  " fill="#1E3A8A"/>
  <!-- Lock indicator -->
  <text x="44" y="18" font-family="monospace" font-size="4" fill="#0EA5E9">●REC</text>
</svg>
