<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: AV Diamond v2 — A and V clearly separated within diamond -->
  <!-- Top half = A (triangle pointing up), Bottom half = V (triangle pointing down) -->
  <!-- Horizontal line divides them, each half reads as its letter -->
  <defs>
    <linearGradient id="gavd2t" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="gavd2b" x1="0.5" y1="0.5" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0C4A6E"/>
    </linearGradient>
  </defs>
  <!-- A = top half of diamond -->
  <path d="M 32 2 L 58 30 L 6 30 Z" fill="url(#gavd2t)"/>
  <!-- A crossbar cutout (negative space) -->
  <path d="M 22 24 L 32 10 L 42 24 Z" fill="white" opacity="0.25"/>
  <!-- Thin gap between A and V -->
  <!-- V = bottom half of diamond -->
  <path d="M 6 33 L 58 33 L 32 62 Z" fill="url(#gavd2b)"/>
  <!-- V inner highlight -->
  <path d="M 22 39 L 42 39 L 32 54 Z" fill="white" opacity="0.1"/>
  <!-- Center dividing line -->
  <line x1="6" y1="31.5" x2="58" y2="31.5" stroke="white" stroke-width="2.5"/>
</svg>
