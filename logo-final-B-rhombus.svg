<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Direction B — Vector Rhombus -->
  <!-- Tight rhombus tilted ~18° off vertical, bisected by diagonal -->
  <!-- The diagonal overshoots upper-right corner — vector arrowhead implied. -->

  <!-- Rhombus (Obsidian) -->
  <path d="M 34 6 L 56 30 L 30 58 L 8 34 Z" fill="#0B0D12"/>

  <!-- Bisecting diagonal (Vector Blue) — overshoots top-right -->
  <line x1="12" y1="48" x2="60" y2="14" stroke="#2D5BFF" stroke-width="5" stroke-linecap="square"/>
</svg>
