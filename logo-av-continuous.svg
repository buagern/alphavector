<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Concept: AV as one continuous line — never lifting the pen -->
  <!-- Single stroke draws both letters, ligature style -->
  <defs>
    <linearGradient id="gavc" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>
  <path d="M 4 54 L 18 10 L 32 42 L 46 10 L 60 54" stroke="url(#gavc)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crossbar of A -->
  <path d="M 10 36 L 24 36" stroke="#1E3A8A" stroke-width="4" stroke-linecap="round"/>
</svg>
